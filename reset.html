<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>リセットツール</title>
<style>
body{font-family:-apple-system,sans-serif;padding:2rem;background:#f5f5f3;max-width:400px;margin:0 auto}
h2{margin-bottom:8px;font-size:18px}
p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.6}
button{width:100%;padding:16px;font-size:15px;border:none;border-radius:12px;cursor:pointer;margin-bottom:12px;font-weight:600}
.green{background:#1a9e6e;color:white}
.red{background:#d14f2e;color:white}
.blue{background:#2e6fd1;color:white}
.gray{background:#e0e0de;color:#444}
#output{font-size:12px;background:#fff;padding:12px;border-radius:8px;margin-top:12px;white-space:pre-wrap;border:1px solid #e0e0de}
</style>
</head>
<body>
<h2>🛠 リセットツール</h2>
<p>問題が発生したときに使用してください</p>

<button class="green" onclick="markAllTatekaeAsRecovered()">🤝 既存の立替を全て回収済みにする</button>
<button class="blue" onclick="resetCats()">🔄 カテゴリをデフォルトに戻す</button>
<button class="red" onclick="resetPw()">🔑 パスワードをリセット（初期値:1234）</button>
<button class="gray" onclick="showData()">📋 現在のデータを確認</button>

<div id="output"></div>

<script>
const DEFAULT_CATS={
  expense:[
    {id:'food',label:'食費',color:'#d14f2e',emoji:'🍚'},
    {id:'transport',label:'交通費',color:'#2e6fd1',emoji:'🚃'},
    {id:'utility',label:'光熱費',color:'#c49a1a',emoji:'💡'},
    {id:'oshi',label:'推し',color:'#c43d7a',emoji:'🌟'},
    {id:'entertainment',label:'娯楽',color:'#7f4fd1',emoji:'🎮'},
    {id:'health',label:'医療',color:'#1a9e6e',emoji:'💊'},
    {id:'clothing',label:'衣類',color:'#9e6e1a',emoji:'👗'},
    {id:'tatekae',label:'立替払い',color:'#888780',emoji:'🤝'},
    {id:'other_exp',label:'その他',color:'#5a5a58',emoji:'📦'},
  ],
  income:[
    {id:'salary',label:'給与',color:'#1a9e6e',emoji:'💰'},
    {id:'bonus',label:'ボーナス',color:'#639922',emoji:'🎁'},
    {id:'tatekae_r',label:'立替回収',color:'#2e6fd1',emoji:'↩️'},
    {id:'other_inc',label:'その他収入',color:'#888780',emoji:'📥'},
  ]
};

function markAllTatekaeAsRecovered(){
  try{
    let txs=JSON.parse(localStorage.getItem('kk_txs')||'[]');
    const tatekaeList=txs.filter(t=>t.type==='tatekae');
    if(!tatekaeList.length){
      document.getElementById('output').textContent='立替の記録がありませんでした';
      return;
    }
    let added=0;
    tatekaeList.forEach(t=>{
      // すでに回収済み記録があるか確認
      const recovered=txs.filter(x=>x.type==='income'&&x.cat==='tatekae_r'&&x.note===String(t.id)).reduce((s,x)=>s+x.amount,0);
      const unpaid=(t.totalAmount-t.selfAmount)-recovered;
      if(unpaid>0){
        // 回収済みとして収入記録を追加
        txs.push({
          id:Date.now()+Math.random(),
          type:'income',
          name:'立替回収（初期化）',
          amount:unpaid,
          cat:'tatekae_r',
          walletId:t.walletId,
          date:t.date,
          note:String(t.id)
        });
        added++;
      }
    });
    localStorage.setItem('kk_txs',JSON.stringify(txs));
    document.getElementById('output').textContent=`完了！${added}件の立替を回収済みにしました。\n家計簿アプリを開き直してください。`;
  }catch(e){
    document.getElementById('output').textContent='エラー: '+e.toString();
  }
}

function resetCats(){
  localStorage.setItem('kk_cats',JSON.stringify(DEFAULT_CATS));
  document.getElementById('output').textContent='カテゴリをデフォルトに戻しました！\n家計簿アプリを開き直してください。';
}

function resetPw(){
  localStorage.removeItem('kk_pw');
  document.getElementById('output').textContent='パスワードをリセットしました！\n初期パスワード「1234」でログインしてください。';
}

function showData(){
  const cats=localStorage.getItem('kk_cats');
  const txs=JSON.parse(localStorage.getItem('kk_txs')||'[]');
  const tatekae=txs.filter(t=>t.type==='tatekae');
  const recovered=txs.filter(t=>t.type==='income'&&t.cat==='tatekae_r');
  document.getElementById('output').textContent=
    'カテゴリ: '+(cats?JSON.parse(cats).expense.length+'件':'なし')+'\n'+
    '取引合計: '+txs.length+'件\n'+
    '立替記録: '+tatekae.length+'件\n'+
    '立替回収記録: '+recovered.length+'件';
}
</script>
</body>
</html>
