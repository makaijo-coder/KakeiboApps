<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワードリセット</title>
<style>
body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f7f7f5; gap: 20px; padding: 2rem; }
button { padding: 16px 32px; font-size: 18px; background: #D85A30; color: white; border: none; border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px; }
p { font-size: 14px; color: #666; text-align: center; }
</style>
</head>
<body>
<h2>🔑 パスワードリセット</h2>
<p>ボタンを押すとパスワードが初期値（1234）にリセットされます</p>
<button onclick="reset()">パスワードをリセットする</button>
<script>
function reset(){
  localStorage.removeItem('kk_pw');
  alert('リセットしました！初期パスワード「1234」でログインしてください');
}
</script>
</body>
</html>
