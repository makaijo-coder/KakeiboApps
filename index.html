<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="家計簿"><title>家計簿</title><style>:root{--bg:#f7f7f5;--surface:#ffffff;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);--text:#1a1a1a;--text2:#666;--text3:#999;--radius:12px;--radius2:8px;--success:#1D9E75;--danger:#D85A30;--info:#378ADD;--warning:#BA7517;--success-bg:#E1F5EE;--danger-bg:#FAECE7;--info-bg:#E6F1FB;--warning-bg:#FAEEDA}@media (prefers-color-scheme:dark){:root{--bg:#1a1a1a;--surface:#2a2a2a;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--text:#f0f0f0;--text2:#aaa;--text3:#666;--success-bg:#0a2e20;--danger-bg:#2e1a0a;--info-bg:#0a1e2e;--warning-bg:#2e2000}}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}#lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:1000;padding:2rem}#lock-screen h1{font-size:24px;font-weight:600;color:var(--text)}#lock-screen .subtitle{font-size:14px;color:var(--text2)}#lock-screen input{width:100%;max-width:280px;font-size:18px;padding:14px 16px;border:0.5px solid var(--border2);border-radius:var(--radius2);background:var(--surface);color:var(--text);text-align:center;letter-spacing:4px;outline:none}#lock-screen button{width:100%;max-width:280px;padding:14px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius2);font-size:16px;font-weight:500;cursor:pointer}#lock-error{color:var(--danger);font-size:13px;min-height:18px}#app{display:none}.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);min-height:80px}.tab-btn{flex:1;padding:20px 4px 16px;font-size:13px;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}.tab-btn i{font-size:36px}.tab-btn.active{color:var(--text)}.content{padding:16px 16px calc(100px+env(safe-area-inset-bottom))}.section{display:none}.section.active{display:block}.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}.card-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:12px}.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}.metric-card{background:var(--bg);border-radius:var(--radius2);padding:12px}.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}.metric-value{font-size:18px;font-weight:600}.metric-value.s{color:var(--success)}.metric-value.d{color:var(--danger)}.type-toggle{display:flex;background:var(--bg);border-radius:var(--radius2);padding:3px;margin-bottom:12px;gap:3px}.type-btn{flex:1;padding:8px 4px;font-size:12px;background:none;border:none;border-radius:6px;color:var(--text2);cursor:pointer;font-weight:500}.type-btn.ae{background:var(--danger-bg);color:var(--danger)}.type-btn.ai{background:var(--success-bg);color:var(--success)}.type-btn.at{background:var(--info-bg);color:var(--info)}.type-btn.ab{background:var(--warning-bg);color:var(--warning)}.fi{width:100%;font-size:15px;padding:12px;border:0.5px solid var(--border);border-radius:var(--radius2);background:var(--surface);color:var(--text);margin-bottom:10px;outline:none;-webkit-appearance:none}.fi:focus{border-color:var(--border2)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.add-btn{width:100%;padding:14px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius2);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}.add-btn.outline{background:var(--surface);color:var(--text);border:0.5px solid var(--border2)}.wallet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px}.wallet-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius2);padding:12px}.wallet-name{font-size:11px;color:var(--text2);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.wallet-bal{font-size:16px;font-weight:600;color:var(--text)}.wallet-bal.neg{color:var(--danger)}.grp-label{font-size:11px;font-weight:600;color:var(--text3);margin:14px 0 8px;letter-spacing:0.05em}.tx-list{list-style:none}.tx-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)}.tx-item:last-child{border-bottom:none}.tx-icon{width:36px;height:36px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}.tx-info{flex:1;min-width:0}.tx-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tx-sub{font-size:11px;color:var(--text2);margin-top:2px}.tx-right{text-align:right;flex-shrink:0}.tx-amt{font-size:14px;font-weight:600}.tx-wlt{font-size:10px;color:var(--text3);margin-top:2px}.tx-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}.tag{font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px}.tag-e{background:var(--danger-bg);color:var(--danger)}.tag-i{background:var(--success-bg);color:var(--success)}.tag-t{background:var(--info-bg);color:var(--info)}.tag-b{background:var(--warning-bg);color:var(--warning)}.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.month-nav button{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius2);padding:8px 16px;font-size:15px;color:var(--text);cursor:pointer}.month-nav span{font-size:16px;font-weight:600;color:var(--text)}.prog-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}.prog-fill{height:100%;border-radius:3px}.empty{text-align:center;padding:2rem 0;font-size:14px;color:var(--text3)}.page-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:16px}.hint{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.6}.setting-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)}.setting-row:last-child{border-bottom:none}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end}.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px calc(20px+env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}.modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;text-align:center}.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}</style><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/tabler-icons.min.css"></head><body><!-- パスワード画面 --><div id="lock-screen"><div style="font-size:48px;">🔐</div><h1>家計簿</h1><p class="subtitle">パスワードを入力してください</p><input type="password" id="pw-input" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryUnlock()" /><p id="lock-error"></p><button onclick="tryUnlock()">ロック解除</button><p style="font-size:11px;color:var(--text3);margin-top:8px;">初期パスワード: 1234</p></div><!-- メインアプリ --><div id="app"><div class="content"><div id="tab-wallets" class="section"><div class="page-title">残高</div><div id="wallet-groups"></div><div class="card" style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;color:var(--text2);">総資産</span><span style="font-size:22px;font-weight:700;" id="total-assets">¥0</span></div><div class="card"><div class="card-title">今月のサマリー</div><div class="metric-grid" id="summary-mini"></div></div></div><div id="tab-record" class="section active"><div class="page-title">記録</div><div class="card"><div class="type-toggle"><button class="type-btn ae" id="btn-e" onclick="setTxType('expense')">支出</button><button class="type-btn" id="btn-i" onclick="setTxType('income')">収入</button><button class="type-btn" id="btn-t" onclick="setTxType('transfer')">送金</button><button class="type-btn" id="btn-b" onclick="setTxType('tatekae')">立替</button><button class="type-btn" id="btn-n" onclick="setTxType('nisa')">NISA</button></div><div id="form-expense"><input type="text" class="fi" id="e-name" placeholder="内容（例：スーパー）" /><div class="row2"><input type="number" class="fi" id="e-amount" placeholder="金額（円）" min="0" /><select class="fi" id="e-cat"></select></div><div class="row2"><select class="fi" id="e-wallet"></select><input type="date" class="fi" id="e-date" /></div><button class="add-btn" onclick="addExpense()">支出を追加</button></div><div id="form-income" style="display:none;"><input type="text" class="fi" id="i-name" placeholder="内容（例：給与）" /><div class="row2"><input type="number" class="fi" id="i-amount" placeholder="金額（円）" min="0" /><select class="fi" id="i-cat"></select></div><div class="row2"><select class="fi" id="i-wallet"></select><input type="date" class="fi" id="i-date" /></div><button class="add-btn" onclick="addIncome()">収入を追加</button></div><div id="form-transfer" style="display:none;"><div class="row2"><select class="fi" id="t-from"></select><select class="fi" id="t-to"></select></div><div class="row2"><input type="number" class="fi" id="t-amount" placeholder="金額（円）" min="0" /><input type="date" class="fi" id="t-date" /></div><input type="text" class="fi" id="t-note" placeholder="メモ（例：PayPayチャージ）" /><button class="add-btn" onclick="addTransfer()">送金を記録</button></div><div id="form-nisa" style="display:none;"><input type="text" class="fi" id="n-name" placeholder="内容（例：eMAXIS Slim全世界）" /><div class="row2"><input type="number" class="fi" id="n-amount" placeholder="積立額（円）" min="0" /><select class="fi" id="n-wallet"></select></div><input type="date" class="fi" id="n-date" /><button class="add-btn" onclick="addNisa()" style="background:#1D6FA8;color:#fff;">NISA積立を記録</button></div><div id="form-tatekae" style="display:none;"><input type="text" class="fi" id="b-name" placeholder="内容（例：4人でご飯）" /><div class="row2"><input type="number" class="fi" id="b-total" placeholder="立替総額（円）" min="0" /><input type="number" class="fi" id="b-self" placeholder="自己負担（円）" min="0" /></div><div class="row2"><select class="fi" id="b-wallet"></select><input type="date" class="fi" id="b-date" /></div><p class="hint">回収できたら「収入 → 立替回収」で登録してください</p><button class="add-btn" onclick="addTatekae()">立替を記録</button></div></div></div><div id="tab-list" class="section"><div class="month-nav"><button onclick="changeMonth(-1)">‹</button><span id="month-label"></span><button onclick="changeMonth(1)">›</button></div><ul class="tx-list" id="tx-list"></ul></div><div id="tab-graph" class="section"><div class="month-nav"><button onclick="changeMonth(-1)">‹</button><span id="month-label2"></span><button onclick="changeMonth(1)">›</button></div><div class="metric-grid" id="graph-summary"></div><div class="card"><div class="card-title">カテゴリ別支出</div><div style="position:relative;height:200px;"><canvas id="catChart" role="img" aria-label="カテゴリ別支出">支出内訳</canvas></div><div id="cat-legend" style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;font-size:11px;color:var(--text2);"></div></div><div class="card"><div class="card-title">月別収支</div><div style="position:relative;height:180px;"><canvas id="monthChart" role="img" aria-label="月別収支">月別収支</canvas></div></div></div><div id="tab-budget" class="section"><div class="page-title">予算</div><div class="card" id="budget-overview"></div><div class="card"><div class="card-title">予算を設定する</div><div id="budget-inputs"></div></div></div><div id="tab-settings" class="section"><div class="page-title">設定</div><div class="card"><div class="card-title">スプレッドシート同期</div><p style="font-size:12px;color:var(--text2);margin-bottom:12px;">パソコンで確認したいときは「シートから読込」で最新データを取得できます</p><button class="add-btn outline" id="sync-btn" onclick="loadFromSheet()">📥 シートから読込</button></div><div class="card"><div class="card-title">パスワード変更</div><input type="password" class="fi" id="pw-new" placeholder="新しいパスワード" /><input type="password" class="fi" id="pw-new2" placeholder="確認（もう一度）" /><button class="add-btn outline" onclick="changePw()">パスワードを変更</button></div><div class="card"><div class="card-title">ウォレット一覧</div><div id="wallet-list"></div></div><div class="card"><div class="card-title">カテゴリ管理</div><div id="cat-list-settings"></div><div style="margin-top:14px;"><div class="card-title">カテゴリを追加</div><div class="row2"><input type="text" class="fi" id="c-emoji" placeholder="絵文字（例：🏠）" style="max-width:80px;" /><input type="text" class="fi" id="c-label" placeholder="名前（例：家賃）" /></div><div class="row2"><select class="fi" id="c-type"><option value="expense">支出カテゴリ</option><option value="income">収入カテゴリ</option></select><input type="color" class="fi" id="c-color" value="#888780" style="height:44px;padding:4px;" /></div><button class="add-btn outline" onclick="addCat()">カテゴリを追加</button></div></div><div class="card"><div class="card-title">ウォレットを追加</div><div class="row2"><input type="text" class="fi" id="w-name" placeholder="名前（例：楽天銀行）" /><select class="fi" id="w-type"><option value="cash">💴 現金</option><option value="card">💳 クレカード</option><option value="debit">💳 デビット</option><option value="qr">📱 QR決済</option><option value="ic">🚃 IC/交通</option><option value="bank">🏦 銀行口座</option></select></div><input type="number" class="fi" id="w-init" placeholder="初期残高（円）" min="0" /><button class="add-btn outline" onclick="addWallet()">追加</button></div></div></div><div class="tab-bar"><button class="tab-btn" onclick="switchTab('wallets',this)"><i class="ti ti-wallet"></i><span>残高</span></button><button class="tab-btn active" onclick="switchTab('record',this)"><i class="ti ti-pencil"></i><span>記録</span></button><button class="tab-btn" onclick="switchTab('list',this)"><i class="ti ti-list"></i><span>一覧</span></button><button class="tab-btn" onclick="switchTab('graph',this)"><i class="ti ti-chart-bar"></i><span>グラフ</span></button><button class="tab-btn" onclick="switchTab('budget',this)"><i class="ti ti-target"></i><span>予算</span></button><button class="tab-btn" onclick="switchTab('settings',this)"><i class="ti ti-settings"></i><span>設定</span></button></div></div><!-- 編集モーダル --><div class="modal-overlay" id="edit-modal" style="display:none;" onclick="if(event.target===this)closeEditModal()"><div class="modal"><div class="modal-title">記録を編集</div><input type="text" class="fi" id="edit-name" placeholder="内容" /><input type="number" class="fi" id="edit-amount" placeholder="金額（円）" min="0" /><select class="fi" id="edit-cat"></select><select class="fi" id="edit-wallet"></select><input type="date" class="fi" id="edit-date" /><div class="modal-btns"><button class="add-btn outline" onclick="closeEditModal()">キャンセル</button><button class="add-btn" onclick="saveEdit()">保存する</button></div></div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script><script>const DEFAULT_CATS={
expense:[
{id:'food',label:'食費',color:'#D85A30',emoji:'🍚'},
{id:'transport',label:'交通費',color:'#378ADD',emoji:'🚃'},
{id:'utility',label:'光熱費',color:'#EF9F27',emoji:'💡'},
{id:'oshi',label:'推し',color:'#D4537E',emoji:'🌟'},
{id:'entertainment',label:'娯楽',color:'#7F77DD',emoji:'🎮'},
{id:'health',label:'医療',color:'#1D9E75',emoji:'💊'},
{id:'clothing',label:'衣類',color:'#BA7517',emoji:'👗'},
{id:'tatekae',label:'立替払い',color:'#888780',emoji:'🤝'},
{id:'other_exp',label:'その他',color:'#5F5E5A',emoji:'📦'},
],
income:[
{id:'salary',label:'給与',color:'#1D9E75',emoji:'💰'},
{id:'bonus',label:'ボーナス',color:'#639922',emoji:'🎁'},
{id:'tatekae_r',label:'立替回収',color:'#378ADD',emoji:'↩️'},
{id:'other_inc',label:'その他収入',color:'#888780',emoji:'📥'},
]
};
let CATS={expense:[...DEFAULT_CATS.expense],income:[...DEFAULT_CATS.income]};
try{const sc=JSON.parse(localStorage.getItem('kk_cats')||'null');if(sc)CATS=sc;}catch(e){}
const ALL_CATS=[...CATS.expense,...CATS.income];
const TYPE_META={cash:{icon:'💴',label:'現金'},card:{icon:'💳',label:'クレカード'},debit:{icon:'💳',label:'デビット'},qr:{icon:'📱',label:'QR決済'},ic:{icon:'🚃',label:'IC/交通'},bank:{icon:'🏦',label:'銀行口座'}};
const TYPE_ORDER=['bank','card','debit','qr','ic','cash'];
const DEFAULT_WALLETS=[
{id:1,name:'現金',type:'cash',init:0},
{id:2,name:'楽天カード',type:'card',init:0},
{id:3,name:'Oliveカード',type:'card',init:0},
{id:4,name:'三井住友NL',type:'card',init:0},
{id:5,name:'Oliveデビット',type:'debit',init:0},
{id:6,name:'PayPay',type:'qr',init:0},
{id:7,name:'楽天ペイ',type:'qr',init:0},
{id:8,name:'Suica',type:'ic',init:0},
{id:9,name:'楽天銀行',type:'bank',init:0},
{id:10,name:'三井住友銀行',type:'bank',init:0},
];
let txs=[],wallets=[],budgets={};
try{txs=JSON.parse(localStorage.getItem('kk_txs')||'[]');}catch(e){}
try{wallets=JSON.parse(localStorage.getItem('kk_wallets')||'[]');}catch(e){}
try{budgets=JSON.parse(localStorage.getItem('kk_budgets')||'{}');}catch(e){}
if(!wallets.length)wallets=DEFAULT_WALLETS;
let catChart=null,monthChart=null,currentTxType='expense';
const now=new Date();let viewY=now.getFullYear(),viewM=now.getMonth();
const PW_KEY='kk_pw';
function getSavedPw(){return localStorage.getItem(PW_KEY)||'1234';}
function tryUnlock(){
const val=document.getElementById('pw-input').value;
if(val===getSavedPw()){
document.getElementById('lock-screen').style.display='none';
document.getElementById('app').style.display='block';
renderAll();
}else{
document.getElementById('lock-error').textContent='パスワードが違います';
document.getElementById('pw-input').value='';
}
}
function changePw(){
const a=document.getElementById('pw-new').value;
const b=document.getElementById('pw-new2').value;
if(!a){alert('パスワードを入力してください');return;}
if(a!==b){alert('パスワードが一致しません');return;}
localStorage.setItem(PW_KEY,a);
document.getElementById('pw-new').value='';
document.getElementById('pw-new2').value='';
alert('パスワードを変更しました');
}
const GAS_URL='https://script.google.com/macros/s/AKfycbx_OV4cNaUOmxOid-y7wb8XFY983DkvTDTk3TPvVQ-n48V9FaR7odD2jmGjqEeN_E9n/exec';
function save(){
try{localStorage.setItem('kk_txs',JSON.stringify(txs));localStorage.setItem('kk_wallets',JSON.stringify(wallets));localStorage.setItem('kk_budgets',JSON.stringify(budgets));localStorage.setItem('kk_cats',JSON.stringify(CATS));}catch(e){}
syncToSheet();
}
function syncToSheet(){
fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',transactions:txs}),headers:{'Content-Type':'text/plain'}})
.catch(e=>console.log('sync error',e));
}
function loadFromSheet(){
const btn=document.getElementById('sync-btn');
if(btn){btn.textContent='同期中...';btn.disabled=true;}
fetch(GAS_URL)
.then(r=>r.json())
.then(data=>{
if(data.status==='ok'&&data.transactions.length>0){
txs=data.transactions.map(t=>({
id:Number(t.id),date:t.date,type:t.type,name:t.name,
amount:Number(t.amount)||0,cat:t.cat,walletId:Number(t.walletId)||0,
totalAmount:Number(t.totalAmount)||0,selfAmount:Number(t.selfAmount)||0,
fromId:Number(t.fromId)||0,toId:Number(t.toId)||0,note:t.note
}));
localStorage.setItem('kk_txs',JSON.stringify(txs));
renderAll();
alert('スプレッドシートから'+txs.length+'件読み込みました！');
}else{alert('データがありませんでした');}
if(btn){btn.textContent='📥 シートから読込';btn.disabled=false;}
})
.catch(e=>{alert('読み込みに失敗しました');if(btn){btn.textContent='📥 シートから読込';btn.disabled=false;}});
}
function fmt(n){return '¥'+Math.round(n).toLocaleString('ja-JP');}
function toDay(){return new Date().toISOString().split('T')[0];}
function mkey(y,m){return y+'-'+String(m+1).padStart(2,'0');}
function catById(id){return ALL_CATS.find(c=>c.id===id)||{label:'その他',color:'#888780',emoji:'📦'};}
function walletById(id){return wallets.find(w=>w.id==id);}
function wIcon(w){return w?(TYPE_META[w.type]||{icon:'💳'}).icon:'?';}
function walletBalance(wid){
const w=walletById(wid);if(!w)return 0;
let bal=w.init||0;
txs.forEach(t=>{
if(t.type==='expense'&&t.walletId==wid)bal-=t.amount;
if(t.type==='income'&&t.walletId==wid)bal+=t.amount;
if(t.type==='tatekae'&&t.walletId==wid)bal-=t.totalAmount;
if(t.type==='nisa'&&t.walletId==wid)bal-=t.amount;
if(t.type==='transfer'){if(t.fromId==wid)bal-=t.amount;if(t.toId==wid)bal+=t.amount;}
});
return bal;
}

function renderBudget(){
const mt=monthTxs();const grouped={};
mt.filter(t=>t.type==='expense').forEach(t=>{grouped[t.cat]=(grouped[t.cat]||0)+t.amount;});
const tb=Object.values(budgets).reduce((s,v)=>s+(parseFloat(v)||0),0);

}).join('');
document.getElementById('budget-overview').innerHTML=`<div class="card-title">今月の予算状況</div>${bRows}`+(tb>0?`<div style="margin-top:8px;font-size:13px;color:var(--text2);">合計残額: <span style="font-weight:600;color:${tb-ts>=0?'var(--success)':'var(--danger)'};">${fmt(tb-ts)}</span></div>`:'<p class="empty">予算が未設定です</p>');

}
